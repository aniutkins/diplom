{% extends 'main/base.html' %}

{% block title %}Редагувати профіль{% endblock %}

{% block content %}

<div class="auth-box">

    <h2>✏️ Редагувати профіль</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="primary-btn">
            Зберегти
        </button>

    </form>

    <a class="back-link" href="{% url 'profile' %}">
        ← Назад
    </a>

</div>

{% endblock %}
