{% extends 'main/base.html' %}

{% block title %}Додати річ{% endblock %}

{% block content %}

<div class="auth-box">

    <h2>➕ Додати річ</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="primary-btn">
            Додати
        </button>

    </form>

    <a class="back-link" href="{% url 'home' %}">
        ← Назад
    </a>

</div>

{% endblock %}
